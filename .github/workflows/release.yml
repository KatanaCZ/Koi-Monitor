name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/.cargo-target
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> ../.cargo-target
          shared-key: release
          cache-on-failure: true
          cache-all-crates: true

      - name: Build release exe
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/koi.ps1 -Action Build -SkipClean -NonInteractive
        env:
          CI: true

      - name: Resolve exe path
        id: exe
        shell: pwsh
        run: |
          $p = Join-Path $env:LOCALAPPDATA 'koi-monitor\koi-monitor.exe'
          if (-not (Test-Path $p)) { throw "Exe not found: $p" }
          "path=$p" >> $env:GITHUB_OUTPUT

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: pwsh
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          $notes = & "$env:GITHUB_WORKSPACE/scripts/extract-release-notes.ps1" -Tag $env:GITHUB_REF_NAME
          $notes | Out-File -FilePath "$env:GITHUB_WORKSPACE/release-notes.md" -Encoding utf8NoBOM

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.exe.outputs.path }}
          body_path: release-notes.md
          generate_release_notes: false
